<span class="w-full inline pl-7 pt-3 leading-7">1991 óta szellemi úton<br>Most itt tartok</span>
<main class="container">
  @for (video of videoData; track video ) {
    <div class="thumbnail-with-data">
      <img [src]="video.thumbnail" (click)="openDialog(video.id)" class="thumbnail">
      <span class="text-gray-300 font-light text-sm">{{ video.time }}</span>
    </div>
  }
</main>
